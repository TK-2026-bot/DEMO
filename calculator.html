  :root{
    --bg: #F4F3F0;
    --panel: #FFFFFF;
    --ink: #181818;
    --ink-soft: #5C5C5C;
    --line: #E7E4DD;

    --c-black: #1A1A1A;
    --c-orange: #DD7A3E;
    --c-orange-deep: #B45A20;
    --c-blue: #7E9FAC;
    --c-blue-pale: #AFC9D1;
    --c-peach: #E9B79C;
    --c-grey: #A6A39C;

    --pos: #4F8B6B;
    --neg: #C24A3B;

    --radius: 18px;
    --shadow: 0 1px 2px rgba(20,20,20,0.04), 0 8px 24px rgba(20,20,20,0.05);
    --hover-bg: #F3F1EC;
    --track-bg: #EAE7E0;
    --selected-bg: #F0EEE8;
    --on-black: #FFFFFF;
    --c-black-hover: #333333;
  }

  html[data-theme="dark"]{
    --bg: #15161A;
    --panel: #1E2025;
    --ink: #ECEAE4;
    --ink-soft: #9B9A96;
    --line: #34363C;

    --c-black: #ECEAE4;
    --c-orange: #E8915C;
    --c-orange-deep: #D67D3E;
    --c-blue: #8FB3C2;
    --c-blue-pale: #5E7480;
    --c-peach: #E9B79C;
    --c-grey: #84827C;

    --pos: #6FB78C;
    --neg: #E07564;

    --shadow: 0 1px 2px rgba(0,0,0,0.3), 0 8px 24px rgba(0,0,0,0.35);
    --hover-bg: #26282E;
    --track-bg: #2A2C32;
    --selected-bg: #282A30;
    --on-black: #15161A;
    --c-black-hover: #D8D6CF;
  }

  html, body{ transition: background 0.25s ease, color 0.25s ease; }
  .theme-toggle{
    display:flex;
    align-items:center;
    justify-content:center;
    width: 37px;
    height: 37px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 9px;
    color: var(--ink);
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.15s ease;
  }
  .theme-toggle:hover{ border-color: var(--ink-soft); background: var(--hover-bg); }
  .theme-toggle svg{ width: 17px; height: 17px; }
  .theme-toggle .icon-moon{ display: none; }
  html[data-theme="dark"] .theme-toggle .icon-sun{ display: none; }
  html[data-theme="dark"] .theme-toggle .icon-moon{ display: block; }
  /* ===== KPI ROW ===== */
  .kpi-grid{
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-bottom: 14px;
  }

  .kpi-card{
    background: var(--panel);
    border-radius: 12px;
    box-shadow: var(--shadow);
    padding: 11px 18px 12px;
    position: relative;
    overflow: hidden;
    border-top: 3px solid var(--accent, var(--c-orange));
    display:flex;
    flex-direction: column;
    gap: 5px;
    transition: box-shadow 0.2s ease, border-color 0.2s ease;
  }

  .kpi-card.active{
    box-shadow: 0 0 0 2px var(--accent), var(--shadow);
  }

  .kpi-card.active .value{
    color: var(--accent);
  }

  .kpi-card .label{
    font-size: 10.5px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-soft);
    font-weight: 400;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .kpi-card .value{
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: clamp(19px, 1.7vw, 23px);
    letter-spacing: 0.2px;
    color: var(--ink);
    line-height: 1;
    transition: color 0.2s ease;
  }

  .kpi-card .value sup{
    font-size: 0.5em;
    font-weight: 500;
    margin-left: 2px;
  }

  /* ===== WHAT-IF PANEL ===== */
  .whatif-panel{
    background: var(--panel);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 16px 22px 18px;
    margin-bottom: 16px;
    border: 1px dashed var(--line);
    transition: padding-bottom 0.2s ease;
  }

  .whatif-panel.collapsed{
    padding-bottom: 16px;
  }

  .whatif-head{
    display:flex;
    align-items:center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 14px;
    cursor: pointer;
    user-select: none;
  }

  .whatif-panel.collapsed .whatif-head{ margin-bottom: 0; }

  .whatif-title{
    display:flex;
    align-items:center;
    gap: 8px;
    font-family: 'AV Fontimer', sans-serif;
    text-transform: uppercase;
    font-size: 14px;
    letter-spacing: 0.06em;
    color: var(--ink);
  }
  .whatif-title svg:first-child{ width: 17px; height: 17px; color: var(--c-orange); flex-shrink: 0; }

  .whatif-chevron{
    width: 15px; height: 15px;
    color: var(--ink-soft);
    flex-shrink: 0;
    transition: transform 0.2s ease;
    margin-left: 2px;
  }
  .whatif-panel.collapsed .whatif-chevron{ transform: rotate(-90deg); }

  .whatif-reset-all{
    background: none;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 6px 12px;
    font-family: 'AV Fontimer', sans-serif;
    font-size: 12px;
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .whatif-reset-all:hover{ border-color: var(--ink-soft); color: var(--ink); background: var(--hover-bg); }
  .whatif-reset-all:disabled{ opacity: 0.4; cursor: default; }
  .whatif-reset-all:disabled:hover{ background: none; border-color: var(--line); color: var(--ink-soft); }

  .whatif-body{
    display: flex;
    flex-direction: column;
    gap: 16px;
    overflow: hidden;
    max-height: 600px;
    opacity: 1;
    transition: max-height 0.25s ease, opacity 0.2s ease, margin-top 0.2s ease;
  }

  .whatif-panel.collapsed .whatif-body{
    max-height: 0;
    opacity: 0;
  }

  .whatif-sliders{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 16px;
  }

  .whatif-slider-card{
    background: var(--bg);
    border-radius: 12px;
    padding: 12px 14px 10px;
  }

  .whatif-slider-head{
    display:flex;
    align-items:baseline;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .whatif-slider-label{
    font-size: 11.5px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }

  .whatif-slider-pct{
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: 16px;
  }
  .whatif-slider-pct.pos{ color: var(--pos); }
  .whatif-slider-pct.neg{ color: var(--neg); }
  .whatif-slider-pct.zero{ color: var(--ink-soft); }

  .whatif-slider-row{
    display:flex;
    align-items:center;
    gap: 8px;
  }

  .whatif-slider-row input[type="range"]{
    flex: 1;
    accent-color: var(--c-orange);
    height: 4px;
    cursor: pointer;
  }

  .whatif-slider-clear{
    display:flex;
    align-items:center;
    justify-content:center;
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 1px solid var(--line);
    background: var(--panel);
    color: var(--ink-soft);
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.15s ease;
  }
  .whatif-slider-clear:hover{ border-color: var(--neg); color: var(--neg); }
  .whatif-slider-clear svg{ width: 11px; height: 11px; }

  .whatif-results{
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
  }

  .whatif-result-card{
    border-radius: 12px;
    padding: 10px 14px 11px;
    border-top: 3px solid var(--accent, var(--c-orange));
    background: var(--bg);
    transition: background 0.2s ease;
  }
  .whatif-result-card.changed{ background: var(--selected-bg); }

  .whatif-result-label{
    font-size: 10px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }

  .whatif-result-base{
    font-size: 12px;
    color: var(--ink-soft);
    text-decoration: line-through;
    margin-bottom: 1px;
  }
  .whatif-result-base.hidden{ visibility: hidden; }

  .whatif-result-value{
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: 19px;
    color: var(--ink);
    line-height: 1.15;
  }

  .whatif-result-delta{
    font-size: 11px;
    margin-top: 3px;
    font-weight: 500;
  }
  .whatif-result-delta.pos{ color: var(--pos); }
  .whatif-result-delta.neg{ color: var(--neg); }
  .whatif-result-delta.zero{ color: var(--ink-soft); }

  @media (max-width: 900px){
    .whatif-sliders{ grid-template-columns: 1fr; }
    .whatif-results{ grid-template-columns: repeat(2, 1fr); }
  }

  *{ box-sizing: border-box; margin:0; padding:0; }

  html, body{
    background: var(--bg);
    color: var(--ink);
    font-family: 'AV Fontimer', 'Helvetica Neue', Arial, sans-serif;
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
  }

  body{
    padding: 22px clamp(20px, 4vw, 56px) 30px;
    max-width: 900px;
    margin: 0 auto;
  }

  .top{
    display:flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    margin-bottom: 18px;
  }

  .top-left{
    display:flex;
    flex-direction: column;
    gap: 4px;
  }

  .top h1{
    font-size: clamp(19.5px, 2.25vw, 25.5px);
    font-weight: 500;
    letter-spacing: 0.2px;
  }

  .top .meta{
    color: var(--ink-soft);
    font-size: 13px;
    text-align: left;
    line-height: 1.4;
  }

  .footnote{
    margin-top: 10px;
    font-size: 11.5px;
    color: var(--ink-soft);
  }

  /* ===== MOBILE ===== */
  @media (max-width: 640px){
    body{ padding: 14px 14px 24px; }

    .top{ gap: 10px; margin-bottom: 12px; }
    .top-left{ width: 100%; }
    .top h1{ font-size: 16px; line-height: 1.25; letter-spacing: 0; }
    .top .meta{ font-size: 12px; }

    .kpi-grid{ grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 10px; }
    .kpi-card{ padding: 10px 12px 11px; }
    .kpi-card .value{ font-size: 18px; }

    .whatif-panel{ padding: 14px 14px 16px; margin-bottom: 12px; }
    .whatif-title{ font-size: 12.5px; }
    .whatif-reset-all{ font-size: 11px; padding: 6px 10px; }
    .whatif-sliders{ grid-template-columns: 1fr; gap: 12px; margin-bottom: 12px; }
    .whatif-results{ grid-template-columns: repeat(2, 1fr); gap: 10px; }
  }

  @media (max-width: 900px){
    .whatif-sliders{ grid-template-columns: 1fr; }
    .whatif-results{ grid-template-columns: repeat(2, 1fr); }
  }

  @media (max-width: 380px){
    .kpi-grid{ grid-template-columns: 1fr 1fr; gap: 6px; }
    .kpi-card .value{ font-size: 17px; }
    .whatif-results{ grid-template-columns: 1fr 1fr; }
    .top h1{ font-size: 15px; }
  }

</style>
</head>
<body>

  <div class="top">
    <div class="top-left">
      <h1>КАЛЬКУЛЯТОР ПРОДАЖ «ДЕТСКИЙ МИР»</h1>
      <div class="meta">Сценарий «Что если»: меняйте заказы, средний чек и себестоимость — смотрите, как изменится выручка</div>
    </div>
    <button class="theme-toggle" id="theme-toggle" type="button" title="Сменить тему" aria-label="Сменить тему">
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4.5"/><path d="M12 2.5v2.5M12 19v2.5M4.2 4.2l1.8 1.8M18 18l1.8 1.8M2.5 12H5M19 12h2.5M4.2 19.8L6 18M18 6l1.8-1.8" stroke-linecap="round"/></svg>
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 13.5A9 9 0 1110.5 3a7 7 0 0010.5 10.5z" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>

  <!-- ===================== KPI ROW ===================== -->
  <div class="kpi-grid" id="kpi-grid"></div>

  <!-- ===================== WHAT-IF PANEL ===================== -->
  <div class="whatif-panel" id="whatif-panel">
    <div class="whatif-head" id="whatif-head">
      <div class="whatif-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a7 7 0 00-4 12.7V17h8v-2.3A7 7 0 0012 2z" stroke-linecap="round" stroke-linejoin="round"/><path d="M9 21h6M10 18h4" stroke-linecap="round"/></svg>
        Что если…
        <svg class="whatif-chevron" id="whatif-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <button class="whatif-reset-all" id="whatif-reset-all" type="button">Сбросить сценарий</button>
    </div>

    <div class="whatif-body" id="whatif-body">
      <div class="whatif-results" id="whatif-results"></div>

      <div class="whatif-sliders" id="whatif-sliders"></div>
    </div>
  </div>

  <div class="footnote">* — показатель рассчитывается автоматически на основе остальных значений</div>

<script>
/* ============ БАЗОВЫЕ KPI (рассчитаны заранее из данных «Детский мир») ============ */
const BASE_KPI = {
  revenue: 216081.75,
  cost: 154696.00,
  orders: 50,
  avg_check: 4321.6350,
};

const fmtMoney = v => Math.round(v).toLocaleString('ru-RU') + ' ₽';
const fmtInt = v => Math.round(v).toLocaleString('ru-RU');

function deriveFromBase(kpi){
  return {
    ...kpi,
    margin_pct: kpi.revenue > 0 ? (kpi.revenue - kpi.cost) / kpi.revenue * 100 : 0
  };
}

const currentData = { kpi: deriveFromBase(BASE_KPI) };

/* ============ KPI-КАРТОЧКИ (без маржи) ============ */
function renderKPI(){
  const kpiCards = [
    { label: 'Выручка',       value: fmtMoney(currentData.kpi.revenue),   accent: 'var(--c-peach)' },
    { label: 'Заказы',        value: fmtInt(currentData.kpi.orders),      accent: 'var(--c-black)' },
    { label: 'Средний чек',   value: fmtMoney(currentData.kpi.avg_check), accent: 'var(--c-orange)' },
    { label: 'Себестоимость', value: fmtMoney(currentData.kpi.cost),      accent: 'var(--c-grey)' },
  ];
  const kpiGrid = document.getElementById('kpi-grid');
  kpiGrid.innerHTML = '';
  kpiCards.forEach(c => {
    const el = document.createElement('div');
    el.className = 'kpi-card';
    el.style.setProperty('--accent', c.accent);
    el.innerHTML = `
      <div class="label">${c.label}</div>
      <div class="value">${c.value}</div>
    `;
    kpiGrid.appendChild(el);
  });
}

/* ============ ПАНЕЛЬ «ЧТО ЕСЛИ» ============ */
let whatIfPct = { orders: 0, avg_check: 0, cost: 0 };
let whatIfCollapsed = false;

const WHATIF_INPUTS = [
  { key: 'orders',    label: 'Заказы' },
  { key: 'avg_check', label: 'Средний чек' },
  { key: 'cost',      label: 'Себестоимость' },
];

function clampPct(v){
  return Math.max(-30, Math.min(30, Math.round(v)));
}

function formatPct(v){
  const r = Math.round(v);
  const sign = r > 0 ? '+' : '';
  return `${sign}${r}%`;
}

function pctClass(v){
  if (v > 0) return 'pos';
  if (v < 0) return 'neg';
  return 'zero';
}

// рассчитывает значения сценария на основе базовых KPI и заданных процентов,
// не изменяя сами базовые данные
function computeWhatIf(){
  const base = currentData.kpi;
  const orders = base.orders * (1 + whatIfPct.orders / 100);
  const avg_check = base.avg_check * (1 + whatIfPct.avg_check / 100);
  const cost = base.cost * (1 + whatIfPct.cost / 100);

  // зависимые показатели: выручка и маржа пересчитываются на основе значений сценария
  const revenue = orders * avg_check;
  const margin_pct = revenue > 0 ? (revenue - cost) / revenue * 100 : 0;

  return { orders, avg_check, cost, revenue, margin_pct };
}

function renderWhatIf(){
  renderWhatIfSliders();
  renderWhatIfResults();

  const anyChanged = Object.values(whatIfPct).some(v => v !== 0);
  const resetAllBtn = document.getElementById('whatif-reset-all');
  if (resetAllBtn) resetAllBtn.disabled = !anyChanged;
}

function renderWhatIfSliders(){
  const container = document.getElementById('whatif-sliders');
  container.innerHTML = '';
  WHATIF_INPUTS.forEach(({ key, label }) => {
    const pct = whatIfPct[key];
    const card = document.createElement('div');
    card.className = 'whatif-slider-card';
    card.innerHTML = `
      <div class="whatif-slider-head">
        <span class="whatif-slider-label">${label}</span>
        <span class="whatif-slider-pct ${pctClass(pct)}" id="whatif-pct-${key}">${formatPct(pct)}</span>
      </div>
      <div class="whatif-slider-row">
        <input type="range" min="-30" max="30" step="1" value="${pct}" id="whatif-range-${key}" aria-label="${label}">
        <span class="whatif-slider-clear" id="whatif-clear-${key}" title="Сбросить">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12" stroke-linecap="round"/></svg>
        </span>
      </div>
    `;
    container.appendChild(card);

    const rangeInput = card.querySelector(`#whatif-range-${key}`);
    rangeInput.addEventListener('input', (e) => {
      whatIfPct[key] = clampPct(Number(e.target.value));
      renderWhatIf();
    });

    card.querySelector(`#whatif-clear-${key}`).addEventListener('click', () => {
      whatIfPct[key] = 0;
      renderWhatIf();
    });
  });
}

function renderWhatIfResults(){
  const container = document.getElementById('whatif-results');
  const base = currentData.kpi;
  const scenario = computeWhatIf();

  const cards = [
    { label: 'Выручка',       base: base.revenue,    value: scenario.revenue,    fmt: fmtMoney, accent: 'var(--c-peach)',  derived: true },
    { label: 'Заказы',        base: base.orders,     value: scenario.orders,     fmt: fmtInt,   accent: 'var(--c-black)',  derived: false },
    { label: 'Средний чек',   base: base.avg_check,  value: scenario.avg_check,  fmt: fmtMoney, accent: 'var(--c-orange)', derived: false },
    { label: 'Себестоимость', base: base.cost,       value: scenario.cost,       fmt: fmtMoney, accent: 'var(--c-grey)',   derived: false },
  ];

  container.innerHTML = '';
  cards.forEach(c => {
    const deltaPct = c.base !== 0 ? (c.value - c.base) / Math.abs(c.base) * 100 : 0;
    const changed = Math.abs(c.value - c.base) > 0.005;
    const card = document.createElement('div');
    card.className = 'whatif-result-card' + (changed ? ' changed' : '');
    card.style.setProperty('--accent', c.accent);
    card.innerHTML = `
      <div class="whatif-result-label">${c.label}${c.derived ? ' *' : ''}</div>
      <div class="whatif-result-base ${changed ? '' : 'hidden'}">${c.fmt(c.base)}</div>
      <div class="whatif-result-value">${c.fmt(c.value)}</div>
      <div class="whatif-result-delta ${pctClass(deltaPct)}">${changed ? formatPct(deltaPct) : '—'}</div>
    `;
    container.appendChild(card);
  });
}

document.getElementById('whatif-reset-all').addEventListener('click', (e) => {
  e.stopPropagation();
  whatIfPct = { orders: 0, avg_check: 0, cost: 0 };
  renderWhatIf();
});

document.getElementById('whatif-head').addEventListener('click', () => {
  whatIfCollapsed = !whatIfCollapsed;
  document.getElementById('whatif-panel').classList.toggle('collapsed', whatIfCollapsed);
});

/* ============ ПЕРЕКЛЮЧАТЕЛЬ ТЕМЫ ============ */
const themeToggleBtn = document.getElementById('theme-toggle');
themeToggleBtn.addEventListener('click', () => {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
});

/* ============ ИНИЦИАЛИЗАЦИЯ ============ */
renderKPI();
renderWhatIf();

</script>
</body>
</html>
